version: "3.9"

services:
  postgres:
    image: postgres:latest
    container_name: postgres-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-order_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-order_db}

    ports:
      - "5432:5432"

#    volumes:
#      - postgres_data:/var/lib/postgresql/data

    networks:
      - backend-net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-order_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "wal_keep_size=1024MB"
      - "-c"
      - "max_slot_wal_keep_size=10GB"
      - "-c"
      - "hot_standby=on"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-change-me}" ]
    ports:
      - "6379:6379"
    networks:
      - backend-net

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"     # host
      - "29092:29092"   # docker internal
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      KAFKA_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://127.0.0.1:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"

      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks:
      - backend-net

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: redpanda-console
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: "kafka:29092"   # internal listener
    depends_on:
      - kafka
    networks:
      - backend-net

  connect:
    image: debezium/connect:2.7.3.Final
    container_name: connect
    networks: [ backend-net ]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: "kafka:29092"
      GROUP_ID: "connect-cluster-1"

      CONFIG_STORAGE_TOPIC: "connect_configs"
      OFFSET_STORAGE_TOPIC: "connect_offsets"
      STATUS_STORAGE_TOPIC: "connect_status"

      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"

      # Optional but helpful logs
      # CONNECT_LOG4J_ROOT_LOGLEVEL: "INFO"
      # CONNECT_LOG4J_LOGGERS: "org.apache.kafka.connect.runtime.rest=WARN,io.debezium=INFO"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8083/ || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 30

  debezium-ui:
    image: debezium/debezium-ui
    container_name: debezium-ui
    ports:
      - "8089:8080" # Map the UI port to your host machine
    environment:
      # This variable tells the UI where to find your Kafka Connect REST API
      KAFKA_CONNECT_UI_KAFKA_CONNECT_URIS: "http://connect:8083"
      KAFKA_CONNECT_URIS: "http://connect:8083"
    networks:
      - backend-net


networks:
  backend-net:
    driver: bridge

