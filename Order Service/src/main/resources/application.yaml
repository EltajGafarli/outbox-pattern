spring:
  application:
    name: order-service

  jpa:
    database: postgresql
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/order_db}
    username: ${DB_USERNAME:order_user}
    password: ${DB_PASSWORD:change-me}

  data:
    redis:
      database: 0
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:change-me}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

mock:
  loop:
    enabled: true
    delay-ms: 3000

app:
  kafka:
    topic:
      order-events: order-events
    producer:
      send-timeout-ms: 5000

outbox:
  producer:
    loop:
      enabled: true
      delay-ms: 60000
      batch-size: 20
      max-retry-count: 5
      retry-delay-seconds: 15

server:
  port: 8081
